# ─────────────────────────────────────────────────────────────
# SECURITY: Signing credentials should NOT be stored in this file!
# 
# For CI/CD: Use GitHub Secrets (RELEASE_KEYSTORE_B64, KEYSTORE_PASSWORD, etc.)
# For local builds: Create keystore.properties file (excluded from git)
#
# The build script will read from:
# 1. Environment variables (CI priority)
# 2. keystore.properties file (local development)
