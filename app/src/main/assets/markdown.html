<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  color: #e0e0e0;
  background: transparent;
  margin: 0;
  padding: 8px;
}
pre {
  background: #2d2d2d;
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
}
code {
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  font-size: 13px;
}
code { background: #2d2d2d; padding: 2px 6px; border-radius: 4px; }
pre code { background: none; padding: 0; }
a { color: #66b3ff; }
table { border-collapse: collapse; width: 100%; margin: 8px 0; }
th, td { border: 1px solid #404040; padding: 8px; }
th { background: #2d2d2d; }
blockquote { border-left: 3px solid #404040; margin: 8px 0; padding-left: 12px; opacity: 0.8; }
h1, h2, h3 { margin: 16px 0 8px; }
p { margin: 8px 0; }
ul, ol { padding-left: 20px; }
</style>
</head>
<body><div id="content"></div>
<script src="marked.min.js"></script>
<script>
function renderMarkdown(content) {
  document.getElementById('content').innerHTML = marked.parse(content, { breaks: true, gfm: true });
}
</script>
</body>
</html>
