# ClawChat Android Code Coverage Pipeline
# Triggers: push to main, weekly schedule, manual dispatch
# Jobs: run tests with coverage, generate reports, upload to Codecov

name: Code Coverage

on:
  push:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      upload_codecov:
        description: 'Upload to Codecov.io'
        type: boolean
        default: true
      generate_html:
        description: 'Generate HTML report'
        type: boolean
        default: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Coverage Job - Run Tests with JaCoCo
  # ─────────────────────────────────────────────────────────────
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Run Tests with Coverage
        run: |
          ./gradlew \
            testDebugUnitTest \
            jacocoTestReport \
            --no-daemon \
            -x lint \
            -x ktlint
        env:
          GRADLE_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Collect Coverage Reports
        run: |
          mkdir -p coverage-reports
          
          # Find and copy all JaCoCo XML reports
          find . -name "jacocoTestReport.xml" -exec cp {} coverage-reports/ \;
          
          # Find and copy HTML reports
          if [ "${{ github.event.inputs.generate_html }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            find . -name "jacocoTestReport" -type d -exec cp -r {} coverage-reports/html \; 2>/dev/null || true
          fi
          
          echo "Coverage reports collected:"
          ls -la coverage-reports/

      - name: Upload Coverage XML (for Codecov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage-reports/*.xml
          retention-days: 7

      - name: Upload Coverage HTML
        if: github.event.inputs.generate_html == 'true' || github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-reports/html/**
          retention-days: 14

      - name: Upload to Codecov
        if: (github.event.inputs.upload_codecov == 'true' || github.event_name == 'schedule') && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-reports/*.xml
          flags: unittests
          name: codecov-clawchat
          fail_ci_if_error: false
          verbose: true

      - name: Parse Coverage Results
        id: coverage
        run: |
          # Parse JaCoCo XML to extract coverage percentages
          XML_FILE=$(find coverage-reports -name "*.xml" | head -1)
          
          if [ -f "$XML_FILE" ]; then
            # Extract coverage using xmllint or grep
            INSTRUCTION_COVERAGE=$(grep -oP 'instruction-covered="\K[0-9]+' "$XML_FILE" | head -1 || echo "0")
            INSTRUCTION_MISSED=$(grep -oP 'instruction-missed="\K[0-9]+' "$XML_FILE" | head -1 || echo "0")
            
            if [ "$INSTRUCTION_MISSED" -gt 0 ] || [ "$INSTRUCTION_COVERAGE" -gt 0 ]; then
              TOTAL=$((INSTRUCTION_COVERAGE + INSTRUCTION_MISSED))
              PERCENTAGE=$(awk "BEGIN {printf \"%.2f\", ($INSTRUCTION_COVERAGE / $TOTAL) * 100}")
            else
              PERCENTAGE="0.00"
            fi
            
            echo "coverage_percent=$PERCENTAGE" >> $GITHUB_OUTPUT
            echo "instruction_covered=$INSTRUCTION_COVERAGE" >> $GITHUB_OUTPUT
            echo "instruction_missed=$INSTRUCTION_MISSED" >> $GITHUB_OUTPUT
          else
            echo "coverage_percent=0.00" >> $GITHUB_OUTPUT
            echo "instruction_covered=0" >> $GITHUB_OUTPUT
            echo "instruction_missed=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate Coverage Summary
        run: |
          PERCENTAGE="${{ steps.coverage.outputs.coverage_percent }}"
          COVERED="${{ steps.coverage.outputs.instruction_covered }}"
          MISSED="${{ steps.coverage.outputs.instruction_missed }}"
          
          # Determine emoji based on coverage
          if (( $(echo "$PERCENTAGE >= 80" | bc -l) )); then
            EMOJI="🟢"
          elif (( $(echo "$PERCENTAGE >= 60" | bc -l) )); then
            EMOJI="🟡"
          else
            EMOJI="🔴"
          fi
          
          cat > coverage-summary.md << EOF
          ## $EMOJI Code Coverage Report
          
          | Metric | Value |
          |--------|-------|
          | **Coverage** | ${PERCENTAGE}% |
          | Instructions Covered | ${COVERED} |
          | Instructions Missed | ${MISSED} |
          | Generated | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          
          ### Coverage Trend
          
          EOF
          
          # Add comparison with previous run if available
          if [ -f coverage-summary.md.bak ]; then
            PREV_PERCENTAGE=$(grep "Coverage" coverage-summary.md.bak | grep -oP '[0-9]+\.[0-9]+' | head -1)
            if [ -n "$PREV_PERCENTAGE" ]; then
              DIFF=$(awk "BEGIN {printf \"%.2f\", $PERCENTAGE - $PREV_PERCENTAGE}")
              if (( $(echo "$DIFF > 0" | bc -l) )); then
                echo "- Change from last run: **+$DIFF%** 📈" >> coverage-summary.md
              elif (( $(echo "$DIFF < 0" | bc -l) )); then
                echo "- Change from last run: **$DIFF%** 📉" >> coverage-summary.md
              else
                echo "- Change from last run: **0.00%** ➡️" >> coverage-summary.md
              fi
            fi
          fi
          
          # Save for next comparison
          cp coverage-summary.md coverage-summary.md.bak
          
          cat coverage-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Coverage (PR Context)
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: coverage-reports/*.xml
          junitxml-path: coverage-reports/*.xml
          coverage-title: Code Coverage Report
          coverage-badge-color: "brightgreen"
          badge-branch: main

      - name: Create Coverage Badge
        run: |
          PERCENTAGE="${{ steps.coverage.outputs.coverage_percent }}"
          
          # Determine color
          if (( $(echo "$PERCENTAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$PERCENTAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          # Generate badge URL (using shields.io)
          BADGE_URL="https://img.shields.io/badge/coverage-${PERCENTAGE}%25-${COLOR}"
          
          echo "## Badge" >> $GITHUB_STEP_SUMMARY
          echo "![$BADGE_URL]($BADGE_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Markdown: \`![Coverage]($BADGE_URL)\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # Coverage Gates - Block PR if Coverage Too Low
  # ─────────────────────────────────────────────────────────────
  gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check Coverage Threshold
        env:
          COVERAGE_PERCENT: ${{ needs.coverage.outputs.coverage_percent }}
          MIN_COVERAGE: 60  # Minimum required coverage
        run: |
          PERCENTAGE="$COVERAGE_PERCENT"
          MIN="$MIN_COVERAGE"
          
          echo "Current coverage: ${PERCENTAGE}%"
          echo "Required minimum: ${MIN}%"
          
          if (( $(echo "$PERCENTAGE < $MIN" | bc -l) )); then
            echo "❌ Coverage below threshold!"
            echo "Please add more tests to reach ${MIN}% coverage."
            exit 1
          else
            echo "✅ Coverage meets threshold requirement."
          fi

  # ─────────────────────────────────────────────────────────────
  # Historical Tracking - Store Coverage Data
  # ─────────────────────────────────────────────────────────────
  track:
    name: Track Coverage History
    runs-on: ubuntu-latest
    needs: coverage
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Coverage Summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: .github/coverage-data/
        continue-on-error: true

      - name: Store Coverage Data
        run: |
          mkdir -p .github/coverage-data
          
          # Store timestamp and coverage
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PERCENTAGE="${{ needs.coverage.outputs.coverage_percent }}"
          
          echo "$TIMESTAMP,$PERCENTAGE" >> .github/coverage-data/coverage-history.csv
          
          # Keep only last 100 entries
          tail -100 .github/coverage-data/coverage-history.csv > .github/coverage-data/coverage-history.tmp
          mv .github/coverage-data/coverage-history.tmp .github/coverage-data/coverage-history.csv
          
          cat .github/coverage-data/coverage-history.csv

      - name: Commit Coverage Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage history [skip ci]"
          file_pattern: .github/coverage-data/*
          skip_fetch: true
