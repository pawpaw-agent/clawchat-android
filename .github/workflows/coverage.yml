# ClawChat Android Code Coverage Pipeline
# Triggers: push to main, weekly schedule, manual dispatch
# Jobs: run tests with coverage, generate reports, upload to Codecov

name: Code Coverage

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Run weekly on Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      upload_codecov:
        description: 'Upload to Codecov.io'
        type: boolean
        default: true
      generate_html:
        description: 'Generate HTML report'
        type: boolean
        default: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Coverage Job - Run Tests with JaCoCo
  # ─────────────────────────────────────────────────────────────
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "✅ Android licenses accepted"

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Tests with Coverage
        run: |
          ./gradlew \
            testDebugUnitTest \
            jacocoTestReport \
            --no-daemon \
            --stacktrace \
            -x lint \
            -x ktlint
        continue-on-error: true

      - name: Collect Coverage Reports
        run: |
          mkdir -p coverage-reports
          
          # Find and copy all JaCoCo XML reports
          find . -name "jacocoTestReport.xml" -exec cp {} coverage-reports/ \; 2>/dev/null || true
          
          # Find and copy HTML reports
          if [ "${{ github.event.inputs.generate_html }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            find . -name "jacocoTestReport" -type d -exec cp -r {} coverage-reports/html \; 2>/dev/null || true
          fi
          
          echo "Coverage reports collected:"
          ls -la coverage-reports/ 2>/dev/null || echo "No reports generated"

      - name: Upload Coverage XML (for Codecov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage-reports/*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Coverage HTML
        if: github.event.inputs.generate_html == 'true' || github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-reports/html/**
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: (github.event.inputs.upload_codecov == 'true' || github.event_name == 'schedule') && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-reports/*.xml
          flags: unittests
          name: codecov-clawchat
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

      - name: Generate Coverage Summary
        run: |
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports have been generated and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report Type | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| XML | Artifacts → coverage-xml |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML | Artifacts → coverage-html |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # Coverage Gates - Block PR if Coverage Too Low (Optional)
  # ─────────────────────────────────────────────────────────────
  gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'
    continue-on-error: true
    
    steps:
      - name: Check Coverage Threshold (Info Only)
        run: |
          echo "ℹ️ Coverage gate check (informational)"
          echo "Current threshold: 60%"
          echo "To enable strict gating, update coverage.yml"
