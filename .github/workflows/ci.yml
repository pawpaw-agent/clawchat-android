# ClawChat Android CI Pipeline
# Triggers: push to main/develop, pull requests
# Jobs: lint, test, build

name: CI Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint Job - Code Quality Checks
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Run Ktlint (Kotlin Lint)
        run: ./gradlew ktlintCheck --no-daemon
        continue-on-error: true
        if: ${{ hashFiles('**/ktlint.gradle.kts') != '' }}

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Check Dependency Updates
        run: ./gradlew dependencyUpdates --no-daemon
        continue-on-error: true

      - name: Upload Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Test Job - Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            **/build/test-results/**/*.xml
            **/build/reports/tests/**/*.html
          retention-days: 7

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/**/*.html
            **/build/reports/jacoco/**/*.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Build Job - Debug & Release APK
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Decode Keystore (Release Only)
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV
          else
            echo "No keystore found, skipping release build signing"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (Main Branch Only)
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f keystore.jks ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=keystore.jks \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "Skipping signed release build (no keystore)"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Generate Build Metadata
        run: |
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # Summary Job - Aggregate Results
  # ─────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    
    steps:
      - name: Generate CI Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          lint_status="${{ needs.lint.result }}"
          test_status="${{ needs.test.result }}"
          build_status="${{ needs.build.result }}"
          
          echo "| Lint | $lint_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | $test_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $build_status |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$lint_status" = "failure" ] || [ "$test_status" = "failure" ] || [ "$build_status" = "failure" ]; then
            echo "❌ CI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ CI Pipeline Passed" >> $GITHUB_STEP_SUMMARY
          fi
