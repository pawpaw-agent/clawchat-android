# ClawChat Android CI Pipeline
# Triggers: push to main/develop, pull requests
# Jobs: build, basic checks

name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build Job - Debug APK (includes basic validation)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "✅ Android licenses accepted"

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK Signing
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Debug APK not found"
            exit 1
          fi
          # 验证签名一致性（应为 ci-debug.keystore 的指纹）
          EXPECTED_FINGERPRINT="4F:F6:99:1C:E2:04:13:7F:A5:47:A1:22:C7:F0:F6:4F:50:C7:13:C8:77:4A:79:4F:16:AD:B3:FF:A6:BC:D7:FC"
          ACTUAL=$(keytool -printcert -jarfile "$APK_PATH" 2>/dev/null | grep "SHA-256" | head -1 | sed 's/.*: //')
          echo "Expected: $EXPECTED_FINGERPRINT"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" = "$EXPECTED_FINGERPRINT" ]; then
            echo "✅ APK signed with fixed CI debug keystore"
          else
            echo "⚠️ APK signature fingerprint differs (may be OK if keystore was regenerated)"
          fi

      - name: Verify APK Created
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Debug APK not found"
            exit 1
          fi
          echo "✅ Debug APK created: $APK_PATH"
          echo "APK size: $(du -h $APK_PATH | cut -f1)"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Generate Build Summary
        run: |
          echo "## ✅ CI Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Debug APK available in artifacts for download." >> $GITHUB_STEP_SUMMARY
